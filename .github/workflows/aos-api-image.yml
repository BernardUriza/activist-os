# Build the API image and push it to GHCR (insult-ai registry pattern).
# Deliberately image-only: Azure infra is stood up manually first
# (docs/deploy/aos-preflight.md); the OIDC-authed deploy step gets wired
# into this workflow once the Container App exists and the demo is stable.
name: API image to GHCR

on:
  push:
    branches: [main]
    paths:
      - "api/**"
      - ".github/workflows/aos-api-image.yml"
  workflow_dispatch:

concurrency:
  group: api-image-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute lowercase image name
        id: img
        run: |
          IMG_LOWER=$(echo "ghcr.io/${{ github.repository }}/api" | tr '[:upper:]' '[:lower:]')
          echo "image=${IMG_LOWER}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: api
          push: true
          tags: |
            ${{ steps.img.outputs.image }}:${{ github.sha }}
            ${{ steps.img.outputs.image }}:latest
