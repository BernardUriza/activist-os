# API CI — the preflight gate before any Azure deploy exists (insult-ai
# workflow conventions: path-scoped trigger, concurrency cancel, dispatch
# escape hatch). This workflow only proves the API is deployable: deps
# install clean, tests green, lint clean, and no absolute dev-machine paths
# in runtime code (the guardrail that protects the Azure container).
#
# Deploy workflows (Container Apps + SWA) come later, per
# docs/deploy/aos-preflight.md — this CI must be green first.
name: API CI

on:
  push:
    branches: [main]
    paths:
      - "api/**"
      - ".github/workflows/aos-api-ci.yml"
  pull_request:
    paths:
      - "api/**"
      - ".github/workflows/aos-api-ci.yml"
  workflow_dispatch:

concurrency:
  group: api-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: api/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint (ruff, isolated)
        run: ruff check app/ tests/ band_agents/ --isolated

      - name: Tests
        run: python -m pytest tests/ -q

      - name: No absolute local paths in runtime code
        run: |
          ! grep -rn "/Users/\|bernardurizaorozco\|Desktop/" app/ band_agents/ --include="*.py"
